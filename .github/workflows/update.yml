name: Update Parkrun Dashboard

on:
  schedule:
    - cron: '0 21 * * 6'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Generate dashboard
        env:
          PARKRUN_COOKIE: ${{ secrets.PARKRUN_COOKIE }}
        run: python generate.py

      - name: Commit and push index.html
        run: |
          git config user.name  "parkrun-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html parkrun_cache.json
          git diff --staged --quiet || git commit -m "Dashboard update $(date -u '+%Y-%m-%d')"
          git push
